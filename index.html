<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rancak Rantah - Taste the Culture, Explore the Nature</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    /* =========================
       RESET CSS & GLOBAL
    ========================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f5f1;
      color: #222;
      line-height: 1.6;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    /* =========================
       NAVBAR
    ========================= */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 2000;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #d4a64a;
    }

    .menu a {
      color: #fff;
      text-decoration: none;
      margin-left: 28px;
      font-size: 14px;
      font-weight: 500;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #d4a64a;
    }

    /* =========================
       HERO SECTION
    ========================= */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url('https://images.unsplash.com/photo-1596422846543-75c6fc197f07?auto=format&fit=crop&w=1600&q=80')
        center/cover no-repeat;
    }

    .hero-content {
      max-width: 650px;
    }

    .hero h1 {
      font-size: 64px;
      line-height: 1.05;
      margin-bottom: 24px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;
      background: #7a1c1c;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      background: #5d1111;
      transform: translateY(-2px);
    }

    /* =========================
       SECTION GLOBALS
    ========================= */
    section {
      padding: 80px 0;
    }

    .section-title {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .section-subtitle {
      color: #666;
      margin-bottom: 35px;
    }

    /* =========================
       CARD GRID
    ========================= */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 18px;
    }

    .card h3 {
      margin-bottom: 8px;
      font-size: 22px;
    }

    .card p {
      color: #666;
      font-size: 14px;
    }

    /* =========================
       EVENT & CALENDAR SECTION
    ========================= */
    .event-section {
      background: linear-gradient(135deg, #5d0d0d, #8f1d1d);
      color: white;
    }

    .event-section .section-subtitle {
      color: #f5dede;
    }

    .event-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    /* Calendar UI */
    .calendar-container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 20px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      text-align: center;
    }
